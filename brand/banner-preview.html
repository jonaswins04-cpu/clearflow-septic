<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;background:#EFF7FA;font-family:system-ui,sans-serif;padding:24px 14px;color:#1B2830}
h1{text-align:center;color:#0D4A6B;font-size:20px;margin:0 0 4px}
p.s{text-align:center;color:#53646E;font-size:13px;margin:0 0 24px}
.wrap{max-width:640px;margin:0 auto}
.h{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#0C8FB0;margin:22px 0 8px}
img{width:100%;border-radius:10px;box-shadow:0 6px 20px rgba(8,51,76,.18);display:block}
.mobile-note{position:relative}
.crop{position:absolute;top:0;bottom:0;background:rgba(8,51,76,.42);width:15.5%}
.crop.l{left:0;border-radius:10px 0 0 10px}.crop.r{right:0;border-radius:0 10px 10px 0}
.cap{font-size:12px;color:#7A8891;margin-top:6px;text-align:center}
</style></head><body>
<h1>Clearflow Septic — Facebook Cover</h1>
<p class="s">1640×624 · designed so nothing important gets cut off on mobile</p>
<div class="wrap">
  <div class="h">Full banner (desktop view)</div>
  <img src="clearflow-fb-banner.jpg">
  <div class="h">Mobile crop preview</div>
  <div class="mobile-note">
    <img src="clearflow-fb-banner.jpg">
    <div class="crop l"></div><div class="crop r"></div>
  </div>
  <div class="cap">Shaded edges = roughly what Facebook hides on phones. Your logo, tagline, and number stay visible.</div>
</div>
</body></html>
