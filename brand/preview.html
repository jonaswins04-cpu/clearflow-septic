<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;background:#EFF7FA;font-family:system-ui,sans-serif;padding:28px 16px;color:#1B2830}
h1{text-align:center;color:#0D4A6B;font-size:22px;margin:0 0 4px}
p.s{text-align:center;color:#53646E;margin:0 0 28px;font-size:14px}
.sec{max-width:640px;margin:0 auto 30px}
.h{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#0C8FB0;margin:0 0 10px;padding-left:4px}
.box{background:#fff;border:1px solid #DCE8EE;border-radius:14px;padding:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(8,51,76,.06)}
.box.dark{background:#0D4A6B}
.card-img{width:100%;border-radius:12px;box-shadow:0 8px 26px rgba(8,51,76,.22);display:block}
.two{display:grid;grid-template-columns:1fr;gap:16px}
img{max-width:100%;display:block}
</style></head><body>
<h1>Clearflow Septic — Brand Kit</h1>
<p class="s">Logo, icon, and business card. Scroll through, then tell me any tweaks.</p>

<div class="sec"><div class="h">Primary logo</div><div class="box"><img src="clearflow-logo.png" style="width:88%"></div></div>
<div class="sec"><div class="h">On dark</div><div class="box dark"><img src="clearflow-logo-reversed.png" style="width:88%"></div></div>
<div class="sec"><div class="h">Icon / favicon</div><div class="box"><img src="clearflow-icon.png" style="width:130px"></div></div>

<div class="sec"><div class="h">Business card — front</div><img class="card-img" src="clearflow-card-front.png"></div>
<div class="sec"><div class="h">Business card — back</div><img class="card-img" src="clearflow-card-back.png"></div>
</body></html>
